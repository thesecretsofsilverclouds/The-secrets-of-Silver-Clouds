<head>
  <meta charset="UTF-8">

  <meta property="og:title" content="I Joined Ragnorir ᚢ">
  <meta property="og:description"
    content="I took the Faction Assessment and joined Ragnorir. Where does your allegiance lie? Take the quiz to find out.">
  <meta property="og:image" content="https://thesecretsofsilverclouds.com/images/ragnorir.png">
  <meta property="og:url" content="https://thesecretsofsilverclouds.com/result-ragnorir">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="I Joined Ragnorir ᚢ">
  <meta name="twitter:description"
    content="I took the Faction Assessment and joined Ragnorir. Where does your allegiance lie?">
  <meta name="twitter:image" content="https://thesecretsofsilverclouds.com/images/ragnorir.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: #1a1a2e;
      color: #e8f4fd;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('images/ragnorir.png') center/cover no-repeat;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10, 8, 6, 0.6) 0%, rgba(10, 8, 6, 0.85) 50%, rgba(10, 8, 6, 0.95) 100%);
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 600px;
      animation: fadeUp 1s ease-out forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .faction-rune {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .faction-label {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #6fa3d0;
      margin-bottom: 8px;
    }

    .faction-name {
      font-family: 'Cinzel Decorative', 'Cinzel', serif;
      font-size: 42px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
      line-height: 1.2;
      text-shadow: 0 0 40px rgba(111, 163, 208, 0.4);
    }

    .faction-tagline {
      font-style: italic;
      color: #8ab4d4;
      font-size: 16px;
      margin-bottom: 32px;
      line-height: 1.6;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    .challenge-text {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 2px;
      color: rgba(232, 196, 64, 0.8);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .cta-btn {
      display: inline-block;
      padding: 16px 40px;
      font-family: 'Cinzel', serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, #4a6b8c 0%, #6fa3d0 100%);
      border: 2px solid rgba(111, 163, 208, 0.6);
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 0 30px rgba(111, 163, 208, 0.3);
    }

    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 50px rgba(111, 163, 208, 0.5);
      border-color: #6fa3d0;
    }

    .site-link {
      margin-top: 40px;
      font-size: 13px;
      color: rgba(138, 180, 212, 0.5);
    }

    .site-link a {
      color: rgba(200, 160, 48, 0.6);
      text-decoration: none;
    }

    .site-link a:hover {
      color: #e8c040;
    }

    .sep {
      width: 200px;
      height: 1px;
      margin: 24px auto;
      background: linear-gradient(to right, transparent, rgba(111, 163, 208, 0.4), transparent);
    }
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="content">
    <div class="faction-rune">ᚢ</div>
    <div class="faction-label">A soul has pledged allegiance to</div>
    <h1 class="faction-name">Ragnorir</h1>
    <p class="faction-tagline">"You were never meant for walls and treaties. You were forged for the storm."</p>
    <div class="sep"></div>
    <p class="challenge-text">Where does your loyalty lie?</p>
    <a href="/faction-quiz" class="cta-btn">Take the Faction Assessment</a>
    <div class="sep"></div>
    <p class="site-link"><a href="/">thesecretsofsilverclouds.com</a></p>
  </div>
</body>

</html>
